<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械零件特征识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .title {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            margin: 30px 0;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }
        
        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .upload-text {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        
        .upload-hint {
            color: #666;
            font-size: 1em;
        }
        
        .file-input {
            display: none;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9ff;
            border-radius: 15px;
            display: none;
        }
        
        .result-title {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .result-content {
            text-align: left;
            background: white;
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
            font-size: 1.1em;
        }
        
        .feature-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .feature-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .feature-name {
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .feature-count {
            color: #333;
            font-size: 2em;
            font-weight: 700;
        }
        
        .loading {
            display: none;
            margin: 30px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .upload-area {
                padding: 40px 15px;
            }
            
            .feature-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🔧 机械零件特征识别</h1>
        <p class="subtitle">上传机械零件图片，AI自动识别槽、孔、倒角、肩、阶等特征</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽图片到这里</div>
            <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
            <input type="file" id="fileInput" class="file-input" accept="image/*">
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <button class="btn" id="analyzeBtn" disabled>开始分析</button>
        <button class="btn" id="resetBtn" style="display: none;">重新上传</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析图片，请稍候...</p>
        </div>
        
        <div class="result-section" id="resultSection">
            <h2 class="result-title">📊 分析结果</h2>
            <img id="previewImage" class="preview-image" style="display: none;">
            <div class="feature-stats" id="featureStats"></div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        class ImageAnalyzer {
            constructor() {
                this.selectedFile = null;
                this.initializeElements();
                this.bindEvents();
            }
            
            initializeElements() {
                this.uploadArea = document.getElementById('uploadArea');
                this.fileInput = document.getElementById('fileInput');
                this.analyzeBtn = document.getElementById('analyzeBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.loading = document.getElementById('loading');
                this.resultSection = document.getElementById('resultSection');
                this.resultContent = document.getElementById('resultContent');
                this.previewImage = document.getElementById('previewImage');
                this.featureStats = document.getElementById('featureStats');
                this.errorMessage = document.getElementById('errorMessage');
                this.successMessage = document.getElementById('successMessage');
            }
            
            bindEvents() {
                // 点击上传区域
                this.uploadArea.addEventListener('click', () => {
                    this.fileInput.click();
                });
                
                // 文件选择
                this.fileInput.addEventListener('change', (e) => {
                    this.handleFileSelect(e.target.files[0]);
                });
                
                // 拖拽上传
                this.uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.uploadArea.classList.add('dragover');
                });
                
                this.uploadArea.addEventListener('dragleave', () => {
                    this.uploadArea.classList.remove('dragover');
                });
                
                this.uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.uploadArea.classList.remove('dragover');
                    this.handleFileSelect(e.dataTransfer.files[0]);
                });
                
                // 分析按钮
                this.analyzeBtn.addEventListener('click', () => {
                    this.analyzeImage();
                });
                
                // 重置按钮
                this.resetBtn.addEventListener('click', () => {
                    this.reset();
                });
            }
            
            handleFileSelect(file) {
                if (!file) return;
                
                // 验证文件类型
                const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif'];
                if (!validTypes.includes(file.type)) {
                    this.showError('请选择有效的图片文件（JPG、PNG、GIF）');
                    return;
                }
                
                // 验证文件大小（10MB限制）
                if (file.size > 10 * 1024 * 1024) {
                    this.showError('图片文件大小不能超过10MB');
                    return;
                }
                
                this.selectedFile = file;
                this.hideMessages();
                this.updateUI();
                this.showSuccess(`已选择图片: ${file.name}`);
            }
            
            updateUI() {
                if (this.selectedFile) {
                    this.analyzeBtn.disabled = false;
                    this.uploadArea.innerHTML = `
                        <div class="upload-icon">✅</div>
                        <div class="upload-text">已选择: ${this.selectedFile.name}</div>
                        <div class="upload-hint">点击重新选择</div>
                    `;
                } else {
                    this.analyzeBtn.disabled = true;
                    this.uploadArea.innerHTML = `
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击或拖拽图片到这里</div>
                        <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                        <input type="file" id="fileInput" class="file-input" accept="image/*">
                    `;
                    // 重新绑定文件输入事件
                    this.fileInput = document.getElementById('fileInput');
                    this.fileInput.addEventListener('change', (e) => {
                        this.handleFileSelect(e.target.files[0]);
                    });
                }
            }
            
            async analyzeImage() {
                if (!this.selectedFile) {
                    this.showError('请先选择图片');
                    return;
                }
                
                this.hideMessages();
                this.loading.style.display = 'block';
                this.analyzeBtn.disabled = true;
                
                const formData = new FormData();
                formData.append('image', this.selectedFile);
                
                try {
                    const response = await fetch('', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': this.getCookie('csrftoken')
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.displayResults(data);
                    } else {
                        this.showError(data.error || '分析失败，请重试');
                    }
                } catch (error) {
                    this.showError('网络错误，请检查连接后重试');
                    console.error('Error:', error);
                } finally {
                    this.loading.style.display = 'none';
                    this.analyzeBtn.disabled = false;
                }
            }
            
            displayResults(data) {
                // 显示预览图片
                this.previewImage.src = data.image_url;
                this.previewImage.style.display = 'block';
                
                // 显示特征统计
                if (data.features) {
                    const statsHTML = Object.entries(data.features).map(([feature, count]) => `
                        <div class="feature-card">
                            <div class="feature-name">${feature}</div>
                            <div class="feature-count">${count}</div>
                        </div>
                    `).join('');
                    this.featureStats.innerHTML = statsHTML;
                }
                
                // 显示详细结果
                this.resultContent.innerHTML = data.result.replace(/\n/g, '<br>');
                
                // 显示结果区域
                this.resultSection.style.display = 'block';
                this.resetBtn.style.display = 'inline-block';
                this.analyzeBtn.style.display = 'none';
                
                // 滚动到结果区域
                this.resultSection.scrollIntoView({ behavior: 'smooth' });
            }
            
            reset() {
                this.selectedFile = null;
                this.resultSection.style.display = 'none';
                this.resetBtn.style.display = 'none';
                this.analyzeBtn.style.display = 'inline-block';
                this.analyzeBtn.disabled = true;
                this.updateUI();
                this.hideMessages();
            }
            
            showError(message) {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                this.successMessage.style.display = 'none';
            }
            
            showSuccess(message) {
                this.successMessage.textContent = message;
                this.successMessage.style.display = 'block';
                this.errorMessage.style.display = 'none';
            }
            
            hideMessages() {
                this.errorMessage.style.display = 'none';
                this.successMessage.style.display = 'none';
            }
            
            getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new ImageAnalyzer();
        });
    </script>
</body>
</html>
